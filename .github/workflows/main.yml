name: Android Build & Release

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            echo "Generating Gradle Wrapper..."
            gradle wrapper --gradle-version 9.3.0 --distribution-type bin
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: "release-key.jks"
          encodedString: ${{ secrets.KEYSTORE_BASE64 }}

      #- name: Build Debug APK
      #  run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        env:
          SIGNING_KEY_STORE_PATH: ${{ steps.decode_keystore.outputs.filePath }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace
        
      - name: Upload Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 14
          
      - name: Generate Release Tag
        id: tag
        run: |
          echo "tag_name=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "release_name=Release v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Generate Release Notes from commits
        id: notes
        shell: bash
        run: |
          set -e

          last_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"

          if [ -n "$last_tag" ]; then
            range="${last_tag}..HEAD"
            title="Changes since ${last_tag}"
          else
            range="HEAD~20..HEAD"
            title="Recent changes"
          fi

          notes="$(git log $range --pretty=format:'- %s (%h) by @%an' --no-merges)"

          {
            echo "release_body<<EOF"
            echo "**${title}:**"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: ${{ steps.tag.outputs.release_name }}
          body: ${{ steps.notes.outputs.release_body }}
          files: |
            app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release to Telegram Channel
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          set -e

          FILES=(
            "app/build/outputs/apk/release/app-release.apk"
          )

          for f in "${FILES[@]}"; do
            if [ -f "$f" ]; then
              echo "Uploading $f ..."
              # Mengirim dokumen TANPA caption
              curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                -F "chat_id=${TELEGRAM_CHAT_ID}" \
                -F "document=@${f}" > /dev/null
            else
              echo "Skip (not found): $f"
            fi
          done
